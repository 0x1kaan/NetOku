name: NetOku Tweet Agent

on:
  # Sabah 08:00 ve aksam 19:00 (UTC+3 = 05:00 + 16:00 UTC)
  schedule:
    - cron: "0 5 * * *"   # 08:00 Türkiye saati
    - cron: "0 16 * * *"  # 19:00 Türkiye saati
  # Elle de tetiklenebilsin
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (tweet postlanmaz, sadece üretilir)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  tweet:
    name: Üret & Onayla & Postla
    runs-on: ubuntu-latest
    timeout-minutes: 35  # 25dk onay + 10dk buffer

    defaults:
      run:
        working-directory: scripts/tweet-agent

    permissions:
      contents: write  # posted-tweets.json commit için

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 30  # son commit'ler için yeterli

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scripts/tweet-agent/package-lock.json

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Tweet Agent çalıştır
        env:
          CHATGPT_API_TOKEN: ${{ secrets.CHATGPT_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          REPO_ROOT: ${{ github.workspace }}
        run: npm run run

      - name: posted-tweets.json'ı commit et
        if: always()
        run: |
          git config user.name "NetOku Tweet Bot"
          git config user.email "bot@netoku.today"
          git add data/posted-tweets.json || true
          git diff --staged --quiet || git commit -m "chore: tweet log güncelle [skip ci]"
          git push || true
